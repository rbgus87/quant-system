# ============================================================
# 퀀트 전략 설정 파일 (v2.0 최종 확정)
# 코드 변경 없이 전략 파라미터를 조정합니다.
# API 키 등 비밀정보는 .env 파일에서 관리합니다.
#
# ※ 핫리로드 미지원: 설정 변경 후 앱을 재시작해야 적용됩니다.
# ============================================================
#
# 적용 순서: 전략 프리셋 → 금액 프리셋 → 개별 설정 덮어쓰기
#
# 전략 프리셋: 팩터 가중치, 필터, 리스크 관리 결정
# 금액 프리셋: 종목 수, 유동성, 슬리피지만 조정
#   ※ 금액 프리셋은 전략 전용 키를 덮어쓸 수 없음 (settings.py에서 검증)
# ============================================================

# === 활성 프리셋 ===
# 전략: A(핵심 추천) B(보수적) C(공격적)
preset: "A"
# 금액: 소액 / 중액 / 대액 / 거액
sizing: "중액"

# === 개별 덮어쓰기 (선택) ===
# factor_weights:
#   value: 0.70
#   momentum: 0.30
#   quality: 0.00
#
# value_weights:
#   pbr: 0.50
#   pcr: 0.30
#   div: 0.20
#
# universe:
#   market: "KOSPI"
#   min_market_cap_percentile: 10.0
#
# portfolio:
#   n_stocks: 20
#   initial_cash: 10000000
#   rebalance_frequency: "quarterly"   # monthly / quarterly
#   holding_buffer_ratio: 1.5          # 교체 버퍼 (n × ratio 이내 유지)
#
# trading:
#   tax_rate: 0.0015              # 거래세 0.15% (2025년 기준, 매도만)

# ============================================================
# 전략 프리셋 (3개) - 실험 검증 완료 (2017-2024)
#
# 핵심 결정 (실험 근거):
#   - Quality를 복합 스코어에서 제거 (Q=0.00)
#     * Q100% CAGR -2.74% (최악), 프리셋A에 Q25% 포함 시 성과 하락
#     * F-Score는 필터(min_fscore=4)로만 유지하여 재무 불량 종목 배제
#   - V70M30이 최적 조합 (CAGR 13.3%, Sharpe 0.816, 2021-2024)
#   - Vol70(상위 30% 고변동성 제거)이 Vol60/50보다 CAGR+Sharpe 최적
#   - CB/트레일링 스톱 비활성화: 분기 리밸런싱에서는 효과 미미
#     시스템 리스크(코로나/전쟁/금융위기)는 운용자가 수동 관리
# ============================================================
presets:

  # ----------------------------------------------------------
  # A: 핵심 추천 (V70M30 + Vol70)
  # 밸류70% + 모멘텀30%. 실험에서 최고 Alpha(+12.25%) 기록.
  # 2021-2024: CAGR 13.3%, MDD -11.3%, Sharpe 0.816
  # 2020-2024: CAGR 18.4%, MDD -14.4%, Sharpe 1.056
  # ----------------------------------------------------------
  A:
    factor_weights:
      value: 0.70
      momentum: 0.30
      quality: 0.00
    value_weights:
      pbr: 0.50
      pcr: 0.30
      div: 0.20
    universe:
      market: "KOSPI"
      min_market_cap_percentile: 10.0
    momentum:
      absolute_momentum_enabled: false
    quality:
      fscore_enabled: true
      min_fscore: 4
    volatility:
      max_percentile: 70.0
    market_regime:
      enabled: true
      partial_ratio: 0.6
      defensive_ratio: 0.4
    trading:
      max_turnover_pct: 0.50
      trailing_stop_pct: null
      max_drawdown_pct: null
      vol_target: null

  # ----------------------------------------------------------
  # B: 보수적 (V70M30 + Vol50)
  # 변동성 필터 강화로 MDD 우선. 고변동성 상위 50% 제거.
  # 2021-2024: CAGR 11.0%, MDD -14.1%, Sharpe 0.654
  # ----------------------------------------------------------
  B:
    factor_weights:
      value: 0.70
      momentum: 0.30
      quality: 0.00
    value_weights:
      pbr: 0.50
      pcr: 0.30
      div: 0.20
    universe:
      market: "KOSPI"
      min_market_cap_percentile: 10.0
    momentum:
      absolute_momentum_enabled: false
    quality:
      fscore_enabled: true
      min_fscore: 4
    volatility:
      max_percentile: 50.0
    market_regime:
      enabled: true
      partial_ratio: 0.6
      defensive_ratio: 0.4
    trading:
      max_turnover_pct: 0.50
      trailing_stop_pct: null
      max_drawdown_pct: null
      vol_target: null

  # ----------------------------------------------------------
  # C: 공격적 (V100 + Vol70)
  # 밸류 집중, 모멘텀 제거. 저평가 종목 장기 보유.
  # 2021-2024: CAGR 10.6%, MDD -11.8%, Sharpe 0.604
  # ----------------------------------------------------------
  C:
    factor_weights:
      value: 1.00
      momentum: 0.00
      quality: 0.00
    value_weights:
      pbr: 0.50
      pcr: 0.30
      div: 0.20
    universe:
      market: "KOSPI"
      min_market_cap_percentile: 10.0
    momentum:
      absolute_momentum_enabled: false
    quality:
      fscore_enabled: true
      min_fscore: 4
    volatility:
      max_percentile: 70.0
    market_regime:
      enabled: true
      partial_ratio: 0.6
      defensive_ratio: 0.4
    trading:
      max_turnover_pct: 0.30
      trailing_stop_pct: null
      max_drawdown_pct: null
      vol_target: null

  # ----------------------------------------------------------
  # 금액 프리셋 (4단계)
  # 종목 수, 유동성, 슬리피지만 조정. 전략 전용 키는 포함하지 않음.
  # ----------------------------------------------------------

  소액:
    portfolio:
      n_stocks: 10
      initial_cash: 5000000
    trading:
      slippage: 0.001
      max_position_pct: 0.15

  중액:
    portfolio:
      n_stocks: 20
      initial_cash: 10000000
    trading:
      slippage: 0.001
      max_position_pct: 0.07

  대액:
    portfolio:
      n_stocks: 25
      initial_cash: 100000000
    trading:
      slippage: 0.0015
      max_position_pct: 0.05

  거액:
    portfolio:
      n_stocks: 30
      initial_cash: 500000000
    trading:
      slippage: 0.002
      max_position_pct: 0.035

# === 모니터링 설정 ===
monitoring:
  snapshot_enabled: true
  benchmark_enabled: true
  risk_guard:
    enabled: true
    stop_loss_pct: -20
    max_drawdown_alert_pct: -15
    check_interval_minutes: 30

# === DART 공시 알림 설정 ===
# ※ 설정 변경 시 앱 재시작 필요 (핫리로드 미지원)
dart_notifier:
  enabled: true
  polling_interval_minutes: 5
  market_hours_only: true           # 장중에만 폴링
  market_open: "09:00"
  market_close: "15:30"
  instant_alert:
    enabled: true
    categories:                     # 별칭 또는 pblntf_detail_ty 코드
      - major_report                # 주요사항보고서 (B001, B002)
      - unfaithful_disclosure       # 불성실공시법인지정 (E001)
      - fair_disclosure             # 공정공시 (E002)
      - largest_shareholder         # 최대주주변경 (B003)
      - convertible_bond            # 전환사채/신주인수권부사채 (G001, G002)
      - capital_change              # 유무상증자 (G003, G004)
      - merger_split                # 합병/분할 (H001, H002, H003)
  daily_summary:
    enabled: true
    send_time: "17:00"
  api_limit:
    daily_warning_threshold: 8000

# === 로깅 설정 ===
logging:
  trading_log_retention_days: 90    # 거래 로그 보관 (일)
  system_log_retention_days: 30     # 시스템 로그 보관 (일)

# ============================================================
# [ARCHIVED] v2.0 이전 프리셋 (롤백용)
# ============================================================
# v2.0 이전: 전략 A~D (4개, Quality 포함) + 금액 4단계
# v2.0 최종: 전략 A~C (3개, Quality=0) + 금액 4단계
# 롤백 필요 시 git history 참조:
#   git show HEAD~1:config/config.yaml  (v2.0 이전 A~D 프리셋)
