# ============================================================
# 퀀트 전략 설정 파일
# 이 파일을 수정하여 코드 변경 없이 전략 파라미터를 조정합니다.
# API 키 등 비밀정보는 .env 파일에서 관리합니다.
# ============================================================

# === 팩터 가중치 (합 = 1.0) ===
factor_weights:
  value: 0.40       # 밸류 팩터 비중
  momentum: 0.40    # 모멘텀 팩터 비중
  quality: 0.20     # 퀄리티 팩터 비중

# === 밸류 팩터 세부 가중치 (합 = 1.0) ===
value_weights:
  pbr: 0.50         # 1/PBR 비중
  per: 0.30         # 1/PER 비중
  div: 0.20         # 배당수익률 비중

# === 종목 유니버스 필터 ===
universe:
  market: "KOSPI"                    # KOSPI / KOSDAQ / ALL
  min_market_cap_percentile: 10.0    # 시총 하위 N% 제외
  exclude_finance: true              # 금융주 제외
  min_listing_days: 365              # 최소 상장일수
  min_avg_trading_value: 200000000   # 20일 평균 거래대금 하한 (원)

# === 포트폴리오 ===
portfolio:
  n_stocks: 10                       # 선정 종목 수
  weight_method: "equal"             # equal / value_weighted
  initial_cash: 10000000             # 백테스트 초기 자금 (기본 1000만원, --cash 미지정 시 사용)
  max_investment_amount: 0           # 최대 투자 금액 (0=전액 투자, 양수=고정 금액)

# === 거래 비용 & 리스크 관리 ===
trading:
  commission_rate: 0.00015           # 수수료 (0.015%)
  tax_rate: 0.0020                   # 거래세 (0.20%, 매도만, 키움증권 기준)
  slippage: 0.001                    # 슬리피지 (0.1%)
  max_position_pct: 0.10             # 단일 종목 최대 비중 (10%)
  max_turnover_pct: 0.50             # 월간 최대 교체율 (50%)
  max_drawdown_pct: 0.99             # MDD 서킷브레이커 (사실상 비활성화, 밸류 전략은 하락장 리밸런싱이 유리)
  trailing_stop_pct: 0.20            # 종목별 트레일링 스톱 (매수가 대비 -20% 하락 시 강제 매도)
  vol_target: 0.99                   # 변동성 타겟팅 (사실상 비활성화, 필요 시 0.12~0.18로 조정)
  vol_lookback_days: 60              # 변동성 계산 기간 (거래일)

# === 시장 레짐 필터 (하락장 방어) ===
market_regime:
  enabled: true                        # 시장 레짐 필터 활성화
  ma_days: 200                         # 이동평균 기간 (200일)
  partial_ratio: 0.7                   # 중립장 투자 비중 (70%)
  defensive_ratio: 0.5                 # 약세장 투자 비중 (50%)

# === 변동성 필터 ===
volatility:
  filter_enabled: true               # 고변동성 종목 제외
  lookback_days: 252                 # 252영업일 (약 1년) 변동성 계산
  max_percentile: 80.0               # 상위 20% 변동성 종목 제외

# === 듀얼 모멘텀 (절대 + 상대) ===
momentum:
  absolute_momentum_enabled: true    # 절대 모멘텀 활성화
  risk_free_rate: 0.035              # 연간 무위험 수익률 (국고채 3년 기준 3.5%)

# === F-Score 퀄리티 필터(간소화 5점) ===
quality:
  fscore_enabled: true
  min_fscore: 2                      # 5점 만점 중 2점 이상 (최악만 제거)
