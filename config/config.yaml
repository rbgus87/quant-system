# ============================================================
# 퀀트 전략 설정 파일 (v2.0)
# 코드 변경 없이 전략 파라미터를 조정합니다.
# API 키 등 비밀정보는 .env 파일에서 관리합니다.
# ============================================================
#
# 적용 순서: 전략 프리셋 → 금액 프리셋 → 개별 설정 덮어쓰기
#
# 전략 프리셋: 팩터 가중치, 필터, 리스크 관리 결정
# 금액 프리셋: 종목 수, 유동성, 슬리피지만 조정
#   ※ 금액 프리셋은 전략 전용 키를 덮어쓸 수 없음 (settings.py에서 검증)
# ============================================================

# === 활성 프리셋 ===
# 전략: A(균형) B(딥밸류) C(모멘텀) D(방어)
preset: "A"
# 금액: 소액 / 중액 / 대액 / 거액
sizing: "중액"

# === 개별 덮어쓰기 (선택) ===
# factor_weights:
#   value: 0.35
#   momentum: 0.40
#   quality: 0.25
#
# value_weights:
#   pbr: 0.50
#   pcr: 0.30
#   div: 0.20
#
# universe:
#   market: "KOSPI"
#   min_market_cap_percentile: 10.0
#
# portfolio:
#   n_stocks: 20
#   initial_cash: 10000000
#
# trading:
#   max_drawdown_pct: 0.25
#   vol_target: 0.15

# ============================================================
# 전략 프리셋 (4개)
# ============================================================
presets:

  # ----------------------------------------------------------
  # A: 밸류+모멘텀 균형 (기준선)
  # 학술적으로 가장 안정적인 3팩터 조합. 대부분의 시장 국면에서 양호한 성과.
  # ----------------------------------------------------------
  A:
    factor_weights:
      value: 0.35
      momentum: 0.40
      quality: 0.25
    value_weights:
      pbr: 0.50
      pcr: 0.30
      div: 0.20
    universe:
      market: "KOSPI"
      min_market_cap_percentile: 10.0
    momentum:
      absolute_momentum_enabled: true
    quality:
      fscore_enabled: true
      min_fscore: 4
    volatility:
      max_percentile: 80.0
    market_regime:
      enabled: true
      partial_ratio: 0.6
      defensive_ratio: 0.4
    trading:
      max_turnover_pct: 0.50
      trailing_stop_pct: 0.25
      max_drawdown_pct: 0.25
      vol_target: 0.15

  # ----------------------------------------------------------
  # B: 딥밸류 (하락장 매수)
  # 모멘텀 완전 배제. 저평가 종목 장기 보유, 평균 회귀 전략.
  # ----------------------------------------------------------
  B:
    factor_weights:
      value: 0.60
      momentum: 0.00
      quality: 0.40
    value_weights:
      pbr: 0.50
      pcr: 0.30
      div: 0.20
    universe:
      market: "KOSPI"
      min_market_cap_percentile: 10.0
    momentum:
      absolute_momentum_enabled: false
    quality:
      fscore_enabled: true
      min_fscore: 4
    volatility:
      max_percentile: 90.0
    market_regime:
      enabled: true
      partial_ratio: 0.8
      defensive_ratio: 0.6
    trading:
      max_turnover_pct: 0.30
      trailing_stop_pct: 0.30
      max_drawdown_pct: 0.30
      vol_target: 0.18

  # ----------------------------------------------------------
  # C: 모멘텀 추세추종 (강세장 극대화)
  # 강세장 수익 극대화. 약세 전환 시 시장 레짐 필터가 현금 방어.
  # KOSPI+KOSDAQ 전체 유니버스 사용.
  # ----------------------------------------------------------
  C:
    factor_weights:
      value: 0.10
      momentum: 0.70
      quality: 0.20
    value_weights:
      pbr: 0.50
      pcr: 0.30
      div: 0.20
    universe:
      market: "ALL"
      min_market_cap_percentile: 15.0
    momentum:
      absolute_momentum_enabled: true
    quality:
      fscore_enabled: true
      min_fscore: 3
    volatility:
      max_percentile: 70.0
    market_regime:
      enabled: true
      partial_ratio: 0.5
      defensive_ratio: 0.2
    trading:
      max_turnover_pct: 0.60
      trailing_stop_pct: 0.20
      max_drawdown_pct: 0.20
      vol_target: 0.15

  # ----------------------------------------------------------
  # D: 방어형 (최소변동성 + 고배당)
  # MDD 최소화와 Sharpe 극대화에 집중. 배당 수익 + 저변동성 종목.
  # ----------------------------------------------------------
  D:
    factor_weights:
      value: 0.35
      momentum: 0.20
      quality: 0.45
    value_weights:
      pbr: 0.30
      pcr: 0.20
      div: 0.50
    universe:
      market: "KOSPI"
      min_market_cap_percentile: 10.0
    momentum:
      absolute_momentum_enabled: true
    quality:
      fscore_enabled: true
      min_fscore: 5
    volatility:
      max_percentile: 50.0
    market_regime:
      enabled: true
      partial_ratio: 0.6
      defensive_ratio: 0.3
    trading:
      max_turnover_pct: 0.25
      trailing_stop_pct: 0.20
      max_drawdown_pct: 0.15
      vol_target: 0.10

  # ----------------------------------------------------------
  # 금액 프리셋 (4단계)
  # 종목 수, 유동성, 슬리피지만 조정. 전략 전용 키는 포함하지 않음.
  # ----------------------------------------------------------

  소액:
    portfolio:
      n_stocks: 10
      initial_cash: 5000000
    trading:
      slippage: 0.001
      max_position_pct: 0.15

  중액:
    portfolio:
      n_stocks: 20
      initial_cash: 10000000
    trading:
      slippage: 0.001
      max_position_pct: 0.07

  대액:
    portfolio:
      n_stocks: 25
      initial_cash: 100000000
    trading:
      slippage: 0.0015
      max_position_pct: 0.05

  거액:
    portfolio:
      n_stocks: 30
      initial_cash: 500000000
    trading:
      slippage: 0.002
      max_position_pct: 0.035

# ============================================================
# [ARCHIVED] v1.1 프리셋 (롤백용 보존)
# ============================================================
# 기존 전략 프리셋 A~I (9개)와 금액 프리셋 100만~5억 (7개)은
# v2.0 전략 재설계로 제거됨. 롤백 필요 시 git history 참조.
